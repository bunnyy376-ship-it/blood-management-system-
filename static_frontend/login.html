<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blood Management system - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .navbar-brand { font-weight: 800; font-size: 1.5rem; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand" href="index.html">🩸 blood management system</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link text-white" href="login.html">Login</a>
                </li>
                <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
                    <a class="btn btn-light text-danger fw-bold" href="signup.html">Sign Up</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
                </div>
            </div>
        {% endif %}
    {% endwith %}

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card p-5 shadow-sm border-0" style="border-radius: 16px;">
                <h3 class="mb-4 fw-bold text-center text-danger">Welcome Back</h3>
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small text-uppercase">Email Address</label>
                        <input type="email" name="email" class="form-control form-control-lg bg-light border-0" placeholder="name@example.com" required style="border-radius: 10px;">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold small text-uppercase">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-light border-0" placeholder="••••••••" required style="border-radius: 10px;">
                    </div>
                    
                    <button type="submit" class="btn btn-danger btn-lg w-100 fw-bold py-2 shadow-sm" style="border-radius: 10px; letter-spacing: 0.5px;">Login</button>
                </form>
                <div class="text-center mt-4">
                    <small class="text-muted">Don't have an account? <a href="/signup" class="text-danger fw-bold text-decoration-none">Sign up here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
